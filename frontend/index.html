<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      connect-src must allow whatever port the Go backend ends up bound to,
      which is dynamic: user-configurable, with auto-fallback to an
      OS-assigned port when the preferred one is busy. Wildcard ports on
      both localhost and 127.0.0.1 are the only correct shape — pinning a
      specific port here is what broke every non-8080 user from 0.6.2
      onward, because the renderer would fetch the right URL but the
      browser would refuse to connect.

      Both hostnames are listed because the backend binds 127.0.0.1
      explicitly (v4-only) and the renderer targets 127.0.0.1 by URL, but
      the Vite dev server HMR socket runs on localhost — so we keep both
      to avoid coupling this to either choice.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*; media-src 'self' pq-audio:"
    />
    <title>PQ Companion</title>
    <!--
      Boot splash: the main window is shown at ready-to-show before React
      mounts, so without this users saw a black void for the first beat of
      startup. The splash is fully self-contained (its own dark backdrop — no
      global html/body styles) so it can't affect the transparent overlay
      windows, which load this same index.html under a route hash. React's
      first render replaces #root's children, removing it; the inline script
      below also strips it immediately for overlay routes so they never flash
      an opaque backdrop. Inline styles/script only (the CSP allows
      'unsafe-inline' for both, but no external/app assets at this stage).
    -->
    <style>
      #pq-boot {
        position: fixed;
        inset: 0;
        background: #0a0a0a;
        color: #a1a1aa;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
      }
      #pq-boot .pq-boot-spinner {
        width: 26px;
        height: 26px;
        border: 2px solid rgba(255, 255, 255, 0.12);
        border-top-color: #6d9eeb;
        border-radius: 50%;
        animation: pq-boot-spin 0.8s linear infinite;
      }
      #pq-boot .pq-boot-title {
        font-size: 15px;
        letter-spacing: 0.08em;
        font-weight: 600;
        opacity: 0.85;
      }
      @keyframes pq-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="pq-boot">
        <div class="pq-boot-spinner"></div>
        <div class="pq-boot-title">PQ COMPANION</div>
      </div>
    </div>
    <script>
      // Overlay windows (transparent, frameless) load this page under a route
      // hash like "#/dps-overlay-window". They must stay see-through, so drop
      // the opaque splash for any non-main route before it can paint.
      if (location.hash && location.hash !== '#/' && location.hash !== '#') {
        var boot = document.getElementById('pq-boot')
        if (boot) boot.remove()
      }
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
