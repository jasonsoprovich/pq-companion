name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go backend tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Go Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      # The internal/db tests run against the real quarm.db. Download it from
      # the data-latest release (same pattern as release.yml).
      - name: Download game database
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p backend/data
          if gh release download data-latest \
              --pattern "quarm.db" \
              --dir backend/data \
              --repo "$GITHUB_REPOSITORY" 2>/dev/null; then
            echo "quarm.db downloaded ($(du -sh backend/data/quarm.db | cut -f1))"
          else
            echo "::warning::quarm.db not found in data-latest release — db tests will be skipped"
          fi

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Run tests
        working-directory: backend
        run: go test ./...

  # ── TypeScript typecheck ──────────────────────────────────────────────────────
  typecheck-frontend:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
