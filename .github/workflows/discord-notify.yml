name: Discord Notify

# Posts a CHANGELOG.md release section to Discord. Runs automatically on
# every push to main that changes CHANGELOG.md, posting the topmost section
# (idempotent: re-runs on unrelated CHANGELOG edits, like typo fixes, detect
# no version change and exit without posting). Can also be dispatched
# manually to (re)post one specific version's section — e.g. a release
# whose CHANGELOG entry landed in the same push as a later version's and so
# never got its own notification.

on:
  push:
    branches: [main]
    paths:
      - "CHANGELOG.md"
  workflow_dispatch:
    inputs:
      version:
        description: "Specific version to post (e.g. 0.17.4). Leave blank to post the topmost CHANGELOG.md section."
        type: string
        default: ""
      force:
        description: "Force-post the topmost section even if it hasn't changed (ignored when version is set — a specific version always posts)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect release section to post
        id: detect
        env:
          FORCE: ${{ github.event.inputs.force }}
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "$VERSION_INPUT" ]; then
            if ! grep -qE "^## v${VERSION_INPUT}( |$)" CHANGELOG.md; then
              echo "No section found for v$VERSION_INPUT in CHANGELOG.md" >&2
              exit 1
            fi
            echo "Manual post requested for v$VERSION_INPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "target_pattern=^## v${VERSION_INPUT}( |\$)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW_TOP=$(awk '/^## v[0-9]+\.[0-9]+\.[0-9]+/{print; exit}' CHANGELOG.md)
          OLD_TOP=$(git show HEAD~1:CHANGELOG.md 2>/dev/null \
            | awk '/^## v[0-9]+\.[0-9]+\.[0-9]+/{print; exit}' || true)

          if [ -z "$NEW_TOP" ]; then
            echo "No \`## v\` section found in CHANGELOG.md — skipping"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$NEW_TOP" = "$OLD_TOP" ] && [ "$FORCE" != "true" ]; then
            echo "Topmost release unchanged ($NEW_TOP) — skipping"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Detected new top section: $NEW_TOP"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "target_pattern=^## v[0-9]+\\.[0-9]+\\.[0-9]+" >> "$GITHUB_OUTPUT"

      - name: Extract section + post to Discord
        if: steps.detect.outputs.changed == 'true'
        env:
          DISCORD_CHANGELOG_WEBHOOK: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          DISCORD_ANNOUNCEMENTS_WEBHOOK: ${{ secrets.DISCORD_ANNOUNCEMENTS_WEBHOOK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_PATTERN: ${{ steps.detect.outputs.target_pattern }}
        run: |
          set -euo pipefail

          # Extract the section whose header matches TARGET_PATTERN —
          # the topmost `## v` section by default, or one specific
          # version's section when manually dispatched with `version` set.
          SECTION=$(awk -v pat="$TARGET_PATTERN" '
            $0 ~ /^## v[0-9]+\.[0-9]+\.[0-9]+/ {
              if (seen) exit
              if ($0 ~ pat) { seen = 1; print; next }
              next
            }
            seen { print }
          ' CHANGELOG.md)

          HEADER=$(echo "$SECTION" | head -1)
          VERSION=$(echo "$HEADER" | sed -E 's/^## v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          # Body = section minus the header line, with leading blanks stripped.
          BODY=$(echo "$SECTION" | awk 'NR>1' | awk '/./{p=1} p')
          # Headline = first non-empty paragraph that doesn't start with ### or -.
          HEADLINE=$(echo "$BODY" | awk '
            /^### / { exit }
            /^- / { exit }
            /./ { print; got=1; next }
            got { exit }
          ')

          # Look up the matching GitHub release URL (may not exist yet if the
          # CHANGELOG push raced ahead of the release publish).
          RELEASE_URL=$(gh release view "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" --json url -q .url 2>/dev/null || true)

          # Discord embed description max is 4096 chars.
          if [ "${#BODY}" -gt 4000 ]; then
            BODY="${BODY:0:3900}"$'\n\n…full notes on the website.'
          fi

          # ── Post to #changelog ──────────────────────────────────────────
          jq -n \
            --arg title "📦 PQ Companion v$VERSION" \
            --arg url "$RELEASE_URL" \
            --arg desc "$BODY" \
            '{
              embeds: [
                ({
                  title: $title,
                  description: $desc,
                  color: 13215820,
                  footer: { text: "pq-companion.com/changelog" }
                } + (if $url == "" then {} else { url: $url } end))
              ]
            }' \
          | curl -fsS -H "Content-Type: application/json" \
                 -d @- "$DISCORD_CHANGELOG_WEBHOOK"

          echo "Posted to #changelog"

          # ── Post to #announcements ──────────────────────────────────────
          if [ -n "$HEADLINE" ]; then
            ANN_BODY="**PQ Companion v$VERSION is out** — $HEADLINE"
          else
            ANN_BODY="**PQ Companion v$VERSION is out.**"
          fi
          if [ -n "$RELEASE_URL" ]; then
            ANN_BODY="$ANN_BODY"$'\n'"$RELEASE_URL"
          fi

          jq -n --arg content "$ANN_BODY" '{ content: $content }' \
          | curl -fsS -H "Content-Type: application/json" \
                 -d @- "$DISCORD_ANNOUNCEMENTS_WEBHOOK"

          echo "Posted to #announcements"
