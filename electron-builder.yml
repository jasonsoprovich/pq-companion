appId: com.jasonsoprovich.pq-companion
productName: PQ Companion
copyright: Copyright © 2026 jasonsoprovich

directories:
  output: dist
  buildResources: build   # electron-builder looks here for icon.icns / icon.ico

files:
  - out/**/*
  - "!out/**/*.map"

# ── Windows (only supported platform — EverQuest only runs on Windows) ────────
#
# Code signing: set these GitHub Actions secrets to sign the installer.
#   WIN_CSC_LINK     — base64-encoded .pfx certificate (openssl base64 -in cert.pfx)
#   WIN_CSC_KEY_PASSWORD — password for the .pfx
# When both secrets are present, electron-builder signs automatically (SHA-256).
# When absent, the installer is unsigned (SmartScreen will warn on first run).
win:
  # Use ${ext} so each win target gets its correct extension. With a hardcoded
  # ".exe" here, electron-builder applies the same name to BOTH targets and
  # hands the zip target a ".exe" filename — p7zip 16.02 infers format from the
  # extension and fails with E_INVALIDARG (-mm=Deflate to a .exe). ${ext}
  # yields PQ-Companion-Setup-X.Y.Z.exe for nsis (unchanged; latest.yml and the
  # auto-updater depend on this name) and PQ-Companion-Setup-X.Y.Z.zip for zip.
  artifactName: "PQ-Companion-Setup-${version}.${ext}"
  icon: build/icon.ico
  signtoolOptions:
    signingHashAlgorithms: ['sha256']
  target:
    - target: nsis
      arch: [x64]
    # Portable zip alongside the NSIS installer. EverQuest (and therefore PQ
    # Companion) is Windows-only, but a handful of users run the Windows build
    # under Wine/Proton on Linux, where the NSIS installer fails (Retry/Abort
    # loop mid-extraction). The zip is the same fully-built app with no install
    # ceremony — they unzip and run PQ Companion.exe directly. It is purely
    # additive: the NSIS installer, signing, latest.yml, and auto-updater path
    # are untouched. Zip users update manually by re-downloading (auto-update
    # only works through the NSIS flow). Also doubles as a portable Windows
    # build for locked-down machines.
    - target: zip
      arch: [x64]
  extraResources:
    # Go sidecar (.exe)
    - from: backend/bin/pq-companion-server.exe
      to: bin/pq-companion-server.exe
    # EQ game database — required at runtime
    - from: backend/data/quarm.db
      to: bin/data/quarm.db
    # Runtime icon — used by BrowserWindow.icon for the taskbar/title-bar
    - from: build/icon.png
      to: icon.png

nsis:
  oneClick: false
  # Per-user install under %LocalAppData%\Programs\PQ Companion. Removes the
  # "Install for all users" radio that landed some users in C:\Program Files
  # where the app couldn't write to its own directory; user can still pick
  # a custom path via allowToChangeInstallationDirectory if they want.
  perMachine: false
  allowToChangeInstallationDirectory: true
  # Do NOT use electron-builder's built-in AppData wipe. It runs the RMDir
  # unconditionally — including during the silent uninstall that the
  # electron-updater drives as part of an auto-update — which deleted users'
  # saved overlayBounds.json on upgrade (issue #126). AppData cleanup is
  # instead handled in build/installer.nsh, guarded by ${isUpdated} so it
  # only runs on a real user-initiated uninstall.
  deleteAppDataOnUninstall: false
  # Custom NSIS hooks that also wipe %LocalAppData%\pq-companion-updater
  # (electron-updater download cache) and optionally ~/.pq-companion.
  include: build/installer.nsh
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico

# ── Auto-updater publish config ──────────────────────────────────────────────
# releaseType: draft is intentional. electron-builder uploads installer.exe,
# .blockmap, and latest.yml in parallel; when the release does not yet exist,
# each upload races to create it and only one wins — the others abort, leaving
# the release with partial assets (see v0.9.0 first publish attempt). The
# release workflow pre-creates an empty draft before electron-builder runs,
# so all uploads target an existing release. A later workflow step flips the
# draft to published.
publish:
  provider: github
  owner: jasonsoprovich
  repo: pq-companion
  releaseType: draft
