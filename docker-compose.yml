services:
  mysql:
    image: mysql:8.0
    container_name: pq-companion-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: quarmbuddy
      MYSQL_DATABASE: quarm
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --max_allowed_packet=512M
      --innodb_buffer_pool_size=1G
      --innodb_log_file_size=256M
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pquarmbuddy"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  mysql_data:
